<!DOCTYPE html>
<html>
  <head>
    <title>GAMELIFE | Games</title>
    <link rel="stylesheet" href="layout.css">
  </head>
  <body>
    <nav>
      <a href="index.html">Home</a>
      <a href="games_page.html">Games</a>
      <button id="darkModeToggle">Toggle Dark Mode 🌙</button>
    </nav>

    <div class="game-container">
      
      <div class="game-card">
        <div class="game-pic">
          <img src="https://upload.wikimedia.org/wikipedia/en/5/51/Minecraft_cover.png" alt="Minecraft Cover">
        </div>
        <div class="game-info">
          <h2 class="game-title">Minecraft</h2>
          <p class="developer-name">Mojang Studios</p>
          <a href="#" class="game-btn info-btn" 
             data-title="Minecraft" 
             data-dev="Mojang Studios" 
             data-desc="A globally beloved sandbox game where players can explore a procedurally generated 3D world, gather resources, craft tools, and build their ultimate imaginative creations. Whether surviving the night or building massive structures, the possibilities are endless!">
             Get Info
          </a>
        </div>
      </div>

      <div class="game-card">
        <div class="game-pic">
          <img src="https://upload.wikimedia.org/wikipedia/commons/d/d8/League_of_Legends_2019_vector_logo.svg" alt="League of Legends Cover" style="background: #111;">
        </div>
        <div class="game-info">
          <h2 class="game-title">League of Legends</h2>
          <p class="developer-name">Riot Games</p>
          <a href="#" class="game-btn info-btn" 
             data-title="League of Legends" 
             data-dev="Riot Games" 
             data-desc="A highly competitive multiplayer online battle arena (MOBA) game. Two teams of five powerful champions face off to destroy the other's base. Choose your champion, master their unique abilities, and execute strategic plays to claim victory on the Rift.">
             Get Info
          </a>
        </div>
      </div>

      <div class="game-card">
        <div class="game-pic">
          <img src="https://via.placeholder.com/250x150?text=R.E.P.O" alt="R.E.P.O Cover">
        </div>
        <div class="game-info">
          <h2 class="game-title">R.E.P.O</h2>
          <p class="developer-name">Indie Studio</p>
          <a href="#" class="game-btn info-btn" 
             data-title="R.E.P.O" 
             data-dev="Indie Studio" 
             data-desc="A thrilling multiplayer co-op horror game where you and your friends are tasked with recovering highly valuable (and dangerous) assets from abandoned corporate facilities. Teamwork, stealth, and quick thinking are your only tools to survive whatever is lurking in the dark.">
             Get Info
          </a>
        </div>
      </div>

    </div>
    
    <script src="script.js"></script>
  </body>
</html>
