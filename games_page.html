<!DOCTYPE html>
<html>
  <head>
    <title>GAMELIFE | Games</title>
    <link rel="stylesheet" href="layout.css">
  </head>
  <body>
    <nav>
      <a href="index.html">Home</a>
      <a href="games_page.html">Games</a>
      <button id="darkModeToggle">Toggle Dark Mode 🌙</button>
    </nav>

    <div class="game-container">
      
      <div class="game-card">
        <div class="game-pic">
          <img src="minecraft.jpg" alt="Minecraft Cover">
        </div>
        <div class="game-info">
          <h2 class="game-title">Minecraft</h2>
          <div class="game-tags">
            <span class="tag sandbox">Sandbox</span>
            <span class="tag survival">Survival</span>
          </div>
          <p class="developer-name">Mojang Studios</p>
          <a href="#" class="game-btn info-btn" 
             data-title="Minecraft" 
             data-dev="Mojang Studios" 
             data-desc="A globally beloved sandbox game where players can explore a procedurally generated 3D world, gather resources, craft tools, and build their ultimate imaginative creations. Whether surviving the night or building massive structures, the possibilities are endless!"
             data-video="https://www.youtube.com/embed/MmB9b5njVbA">
             Get Info
          </a>
        </div>
      </div>

      <div class="game-card">
        <div class="game-pic">
          <img src="league of legends.jpg" alt="League of Legends Cover" style="background: #111;">
        </div>
        <div class="game-info">
          <h2 class="game-title">League of Legends</h2>
          <div class="game-tags">
            <span class="tag moba">MOBA</span>
            <span class="tag multiplayer">Multiplayer</span>
          </div>
          <p class="developer-name">Riot Games</p>
          <a href="#" class="game-btn info-btn" 
             data-title="League of Legends" 
             data-dev="Riot Games" 
             data-desc="A highly competitive multiplayer online battle arena (MOBA) game. Two teams of five powerful champions face off to destroy the other's base. Choose your champion, master their unique abilities, and execute strategic plays to claim victory on the Rift."
             data-video="https://www.youtube.com/embed/BGtROJeMPeE">
             Get Info
          </a>
        </div>
      </div>

      <div class="game-card">
        <div class="game-pic">
          <img src="REPO.jpg" alt="R.E.P.O Cover">
        </div>
        <div class="game-info">
          <h2 class="game-title">R.E.P.O</h2>
          <div class="game-tags">
            <span class="tag horror">Horror</span>
            <span class="tag coop">Co-op</span>
          </div>
          <p class="developer-name">Indie Studio</p>
          <a href="#" class="game-btn info-btn" 
             data-title="R.E.P.O" 
             data-dev="Indie Studio" 
             data-desc="A thrilling multiplayer co-op horror game where you and your friends are tasked with recovering highly valuable (and dangerous) assets from abandoned corporate facilities. Teamwork, stealth, and quick thinking are your only tools to survive whatever is lurking in the dark."
             data-video="https://www.youtube.com/embed/oSfoK8eSeD8?si=3cciDajvAbE1LLG_">
             Get Info
          </a>
        </div>
      </div>

    </div>

    <div id="infoModal" class="modal">
      <div class="modal-content">
        <span class="close-btn">&times;</span>
        <h2 id="modalTitle"></h2>
        <p><strong>Developer:</strong> <span id="modalDev"></span></p>
        <p id="modalDesc"></p>
        <div class="video-container">
          <iframe id="modalVideo" src="" frameborder="0" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
