<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoStore | Sustainable Shopping</title>
    <style>
        :root {
        --primary-green: #4f6d7a;
        --accent-sage: #c0d6df;
        --eco-white: #f8f9fa;
        --text-dark: #333;
        --disclaimer-red: #d9534f;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--eco-white);
            color: var(--text-dark);
        }
        
        /* Educational Disclaimer */
        .disclaimer-banner {
            background: var(--disclaimer-red);
            color: white;
            text-align: center;
            padding: 10px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        
        nav {
            display: flex;
            justify-content: space-between;
            padding: 20px 5%;
            background: var(--primary-green);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 40px 5%;
        }
        
        .card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            transition: transform 0.2s;
            border: 1px solid #eee;
        }
        
        .card:hover { transform: translateY(-5px); }
        
        .card img { max-width: 100%; border-radius: 5px; }
        
        .badge {
            background: var(--accent-sage);
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 12px;
            display: inline-block;
            margin-top: 10px;
        }
        
        button {
            background: var(--primary-green);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }
        
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        /* Modal/Cart styles */
        #cart-modal {
            position: fixed;
            right: 0; top: 0; width: 300px; height: 100%;
            background: white; box-shadow: -2px 0 5px rgba(0,0,0,0.2);
            display: none; padding: 20px;
        }
    </style>
</head>
<body>
    
    <nav>
        <div class="logo"><strong>EcoStore</strong></div>
        <div class="nav-links">
            <a href="#">Ethics & Supply Chain</a> |
            <button onclick="toggleCart()">Cart (<span id="cart-count">0</span>)</button>
        </div>
    </nav>

    <main>
        <section class="product-grid" id="product-list">
            </section>
    </main>

    <div id="cart-modal">
        <h3>Your Shopping Bag</h3>
        <div id="cart-items"></div>
        <hr>
        <p>Total: $<span id="cart-total">0.00</span></p>
        <button id="checkout-btn" onclick="goToCheckout()">Proceed to Checkout</button>
        <button onclick="toggleCart()" style="background:#888">Close</button>
    </div>

    <script>
        // Simulated JSON Fetch
        const products = [
            { id: 1, name: "Bamboo Fiber Coffee Cup", price: 15.00, eco_impact: "BPA Free", origin: "Vietnam" },
            { id: 2, name: "Organic Cotton Tote", price: 12.50, eco_impact: "100% Organic", origin: "India" },
            { id: 3, name: "Solar Powered Charger", price: 45.00, eco_impact: "Renewable", origin: "China" }
        ];

        let cart = [];

        function renderProducts() {
            const list = document.getElementById('product-list');
            list.innerHTML = products.map(p => `
                <div class="card">
                    <img src="https://via.placeholder.com/150" alt="${p.name}">
                    <h3>${p.name}</h3>
                    <p>$${p.price.toFixed(2)}</p>
                    <span class="badge">${p.eco_impact}</span>
                    <p><small>Sourced from: ${p.origin}</small></p>
                    <button onclick="addToCart(${p.id})">Add to Cart</button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const item = products.find(p => p.id === id);
            cart.push(item);
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const itemsDiv = document.getElementById('cart-items');
            itemsDiv.innerHTML = cart.map(item => `<p>${item.name} - $${item.price}</p>`).join('');
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('cart-total').innerText = total.toFixed(2);
        }

        function toggleCart() {
            const modal = document.getElementById('cart-modal');
            modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
        }

        function goToCheckout() {
            alert("Legal Notice: The checkout process is disabled for this educational prototype.");
        }

        renderProducts();
    </script>
</body>
</html>
