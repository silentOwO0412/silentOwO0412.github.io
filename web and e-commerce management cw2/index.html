/* =========================================================
   TOAST CONTEXT
   ========================================================= */
const ToastContext = createContext(null);

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const toast = ({ title, description, variant, duration=4000 }) => {
    const id = Date.now();
    setToasts(prev => [...prev, { id, title, description, variant }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), duration);
  };
  return (
    <ToastContext.Provider value={{ toast }}>
      {children}
      <div className="toast-container">
        {toasts.map(t => (
          <div key={t.id} className={`toast ${t.variant === 'destructive' ? 'toast-destructive' : ''}`}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              {t.title && <strong style={{fontSize:'0.9rem',color: t.variant==='destructive'?'#dc2626':'#0e2415'}}>{t.title}</strong>}
              <button onClick={() => setToasts(prev => prev.filter(x => x.id !== t.id))} style={{background:'none',border:'none',cursor:'pointer',padding:'0 0 0 1rem',color:'#888',lineHeight:1}}>&times;</button>
            </div>
            {t.description && <p style={{margin:'4px 0 0',fontSize:'0.8rem',color:'#666'}}>{t.description}</p>}
          </div>
        ))}
      </div>
    </ToastContext.Provider>
  );
}

function useToast() {
  const ctx = useContext(ToastContext);
  return ctx;
}

   ========================================================= */
const CartContext = createContext(null);

function CartProvider({ children }) {
  const [items, setItems] = useState([]);

  const addItem = (product, quantity=1) => {
    setItems(prev => {
      const existing = prev.find(i => i.product.id === product.id);
      if (existing) return prev.map(i => i.product.id === product.id ? {...i, quantity: i.quantity+quantity} : i);
      return [...prev, { product, quantity }];
    });
  };

  const removeItem = (productId) => setItems(prev => prev.filter(i => i.product.id !== productId));

  const updateQuantity = (productId, quantity) => {
    if (quantity < 1) return;
    setItems(prev => prev.map(i => i.product.id === productId ? {...i, quantity} : i));
  };

  const clearCart = () => setItems([]);
  const totalItems = items.reduce((s, i) => s + i.quantity, 0);
  const subtotal = items.reduce((s, i) => s + i.product.price * i.quantity, 0);
  const shipping = subtotal > 50 || subtotal === 0 ? 0 : 5.99;
  const total = subtotal + shipping;

  return (
    <CartContext.Provider value={{ items, addItem, removeItem, updateQuantity, clearCart, totalItems, subtotal, shipping, total }}>
      {children}
    </CartContext.Provider>
  );
}

function useCart() {
  return useContext(CartContext);
}

/* =========================================================
   ROUTER (SIMPLE HASH ROUTER)
   ========================================================= */
const RouterContext = createContext(null);

function Router({ children }) {
  const [path, setPath] = useState(() => {
    const h = window.location.hash.replace('#', '') || '/';
    return h;
  });

  useEffect(() => {
    const handler = () => setPath(window.location.hash.replace('#', '') || '/');
    window.addEventListener('hashchange', handler);
    return () => window.removeEventListener('hashchange', handler);
  }, []);

  const navigate = (to) => { window.location.hash = to; };

  return (
    <RouterContext.Provider value={{ path, navigate }}>
      {children}
    </RouterContext.Provider>
  );
}

function useRouter() { return useContext(RouterContext); }

function Link({ href, children, className, style, onClick }) {
  const { navigate } = useRouter();
  return (
    <a href={`#${href}`} className={className} style={style} onClick={(e) => { if(onClick) onClick(e); }}>
      {children}
    </a>
  );
}

function Button({ children, onClick, disabled, className="", variant="default", size="default", asChild, type="button", style }) {
  const base = "inline-flex items-center justify-center font-medium transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-1 cursor-pointer border-0 disabled:opacity-50 disabled:cursor-not-allowed";
  const variants = {
    default: "bg-primary text-white hover:opacity-90 focus:ring-primary/40",
    outline: "bg-transparent border border-current text-primary hover:bg-primary/5",
    ghost: "bg-transparent hover:bg-gray-100 text-current",
    secondary: "bg-secondary text-white hover:opacity-90",
    destructive: "bg-red-600 text-white hover:bg-red-700",
  };
  const sizes = {
    default: "px-4 py-2 text-sm rounded-lg",
    sm: "px-3 py-1.5 text-xs rounded-md",
    lg: "px-6 py-3 text-base rounded-xl",
    icon: "w-9 h-9 rounded-lg p-0",
  };

  if (asChild && React.Children.count(children) === 1) {
    const child = React.Children.only(children);
    return React.cloneElement(child, {
      className: `${base} ${variants[variant]} ${sizes[size]} ${child.props.className || ''} ${className}`,
    });
  }

  return (
    <button type={type} onClick={onClick} disabled={disabled} style={style}
      className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}>
      {children}
    </button>
  );
}

function Badge({ children, className="", variant="default" }) {
  const variants = {
    default: "bg-primary text-white",
    secondary: "bg-secondary text-white",
    outline: "border border-current text-primary bg-transparent",
    destructive: "bg-red-100 text-red-700",
  };
  return <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium ${variants[variant]} ${className}`}>{children}</span>;
}

function Input({ id, type="text", placeholder, value, onChange, disabled, className="", required }) {
  return <input id={id} type={type} placeholder={placeholder} value={value} onChange={onChange} disabled={disabled} required={required}
    className={`w-full px-3 py-2 rounded-lg border border-gray-200 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary/50 transition ${disabled?'opacity-50 cursor-not-allowed bg-gray-50':''} ${className}`}/>;
}

function Label({ htmlFor, children, className="" }) {
  return <label htmlFor={htmlFor} className={`text-sm font-medium text-gray-700 ${className}`}>{children}</label>;
}

function Separator({ className="" }) {

function Select({ value, onValueChange, children }) {

function SelectItem({ value, children }) { return <option value={value}>{children}</option>; }

function Slider({ value, onValueChange, min=0, max=100, step=1 }) {
  return (
    <div style={{display:'flex',flexDirection:'column',gap:'4px'}}>
      <input type="range" min={min} max={max} step={step} value={value[0]} onChange={e => onValueChange([Number(e.target.value), value[1]])} style={{margin:'4px 0'}}/>

function Sheet({ children }) {

  return React.Children.map(children, child =>

/* =========================================================
   PRODUCTS PAGE
   ========================================================= */
function Products() {
  const [search, setSearch] = useState("");
  const [cats, setCats] = useState([]);
  const [price, setPrice] = useState([0,150]);
  const [sort, setSort] = useState("popular");
  const [mobileFilter, setMobileFilter] = useState(false);

  const toggleCat = (cat) => setCats(prev => prev.includes(cat) ? prev.filter(c=>c!==cat) : [...prev,cat]);

  const filtered = useMemo(() => {
    let r = PRODUCTS;
    if (search) { const q=search.toLowerCase(); r=r.filter(p=>p.name.toLowerCase().includes(q)||p.description.toLowerCase().includes(q)||p.category.toLowerCase().includes(q)); }
    if (cats.length) r = r.filter(p => cats.includes(p.category));
    r = r.filter(p => p.price >= price[0] && p.price <= price[1]);
    r = [...r].sort((a,b) => sort==="price-asc"?a.price-b.price:sort==="price-desc"?b.price-a.price:sort==="newest"?(a.badge==="New Arrival"?-1:1):b.rating-a.rating);
    return r;
  }, [search, cats, price, sort]);

  const FilterSidebar = () => (
    <div>
      <div style={{marginBottom:'2rem'}}>
        <h3 style={{fontFamily:'Playfair Display,serif',fontWeight:700,marginBottom:'1rem',fontSize:'1.05rem'}}>Categories</h3>
        <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
          {CATEGORIES.map(cat => (
            <label key={cat} style={{display:'flex',alignItems:'center',gap:'8px',cursor:'pointer',fontSize:'0.9rem'}}>
              <input type="checkbox" checked={cats.includes(cat)} onChange={() => toggleCat(cat)} style={{accentColor:'#1a5c2a'}}/>
              {cat}
            </label>
          ))}
        </div>
      </div>
      <div>
        <h3 style={{fontFamily:'Playfair Display,serif',fontWeight:700,marginBottom:'1rem',fontSize:'1.05rem'}}>Price Range</h3>
        <input type="range" min={0} max={150} step={5} value={price[1]} onChange={e => setPrice([price[0], Number(e.target.value)])} style={{width:'100%',accentColor:'#1a5c2a'}}/>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:'0.85rem',color:'#666',marginTop:'8px'}}>
          <span>${price[0]}</span><span>${price[1]}</span>
        </div>
      </div>
    </div>
  );

  return (
    <div className="container mx-auto px-4 py-12">
      <div style={{marginBottom:'2.5rem'}}>
        <h1 className="font-serif" style={{fontSize:'2.5rem',fontWeight:700,marginBottom:'8px'}}>All Products</h1>
        <p style={{color:'#666'}}>Carefully selected sustainable goods for every aspect of your life.</p>
      </div>
      <div style={{display:'flex',gap:'3rem',alignItems:'flex-start'}}>
        {/* Desktop filters */}
        <aside className="hidden lg:block" style={{width:'220px',flexShrink:0,position:'sticky',top:'80px'}}>
          <div style={{marginBottom:'1.5rem',position:'relative'}}>
            <Search size={16} style={{position:'absolute',left:'10px',top:'50%',transform:'translateY(-50%)',color:'#888'}}/>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search products..."
              style={{width:'100%',padding:'8px 12px 8px 34px',borderRadius:'8px',border:'1px solid #e0d8cc',fontSize:'0.875rem',background:'white'}}/>
          </div>
          <FilterSidebar/>
        </aside>

        <div style={{flex:1}}>
          {/* Top bar */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'1.5rem',gap:'1rem',flexWrap:'wrap',background:'white',padding:'12px 16px',borderRadius:'12px',border:'1px solid #e0d8cc'}}>
            <div className="flex lg:hidden items-center gap-2">
              <button onClick={() => setMobileFilter(true)} style={{display:'flex',alignItems:'center',gap:'6px',padding:'8px 14px',borderRadius:'8px',border:'1px solid #e0d8cc',background:'white',cursor:'pointer',fontSize:'0.85rem',fontWeight:500}}>
                Filters
              </button>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search..."
                style={{padding:'8px 12px',borderRadius:'8px',border:'1px solid #e0d8cc',fontSize:'0.875rem',background:'white'}}/>
            </div>
            <span style={{fontSize:'0.875rem',color:'#666'}}>Showing {filtered.length} product{filtered.length!==1?'s':''}</span>
            <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
              <span style={{fontSize:'0.875rem',color:'#666'}}>Sort by:</span>
              <select value={sort} onChange={e=>setSort(e.target.value)} style={{padding:'6px 10px',borderRadius:'8px',border:'1px solid #e0d8cc',fontSize:'0.875rem',background:'white',cursor:'pointer'}}>
                <option value="popular">Most Popular</option>
                <option value="newest">New Arrivals</option>
                <option value="price-asc">Price: Low to High</option>
                <option value="price-desc">Price: High to Low</option>
              </select>
            </div>
          </div>

          {filtered.length > 0 ? (
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
              {filtered.map((p,i) => <ProductCard key={p.id} product={p} index={i}/>)}
            </div>
          ) : (
            <div style={{textAlign:'center',padding:'5rem 0'}}>
              <h3 className="font-serif" style={{fontSize:'1.5rem',fontWeight:700,marginBottom:'8px'}}>No products found</h3>
              <p style={{color:'#666',marginBottom:'1.5rem'}}>Try adjusting your filters or search query.</p>
              <button onClick={() => { setSearch(""); setCats([]); setPrice([0,150]); }}
                style={{padding:'10px 24px',borderRadius:'8px',border:'1px solid #1a5c2a',color:'#1a5c2a',background:'white',cursor:'pointer',fontWeight:500}}>
                Clear all filters
              </button>
            </div>
          )}
        </div>
      </div>

      {/* Mobile filter drawer */}
      {mobileFilter && (
        <div style={{position:'fixed',inset:0,zIndex:100}}>
          <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.5)'}} onClick={() => setMobileFilter(false)}/>
          <div style={{position:'absolute',top:0,left:0,bottom:0,width:'300px',background:'#f7f5f0',padding:'2rem',overflowY:'auto'}}>
            <button onClick={() => setMobileFilter(false)} style={{position:'absolute',top:'1rem',right:'1rem',background:'none',border:'none',cursor:'pointer',fontSize:'1.5rem'}}>×</button>
            <h2 style={{fontFamily:'Playfair Display,serif',fontWeight:700,marginBottom:'2rem'}}>Filter Products</h2>
            <FilterSidebar/>
          </div>
        </div>
      )}
    </div>
  );
}

/* =========================================================
   PRODUCT DETAIL PAGE
   ========================================================= */
function ProductDetail({ id }) {
  const product = PRODUCTS.find(p => p.id === id);
  const { addItem } = useCart();
  const { toast } = useToast();
  const [quantity, setQuantity] = useState(1);
  const [isAdding, setIsAdding] = useState(false);

  if (!product) return (
    <div style={{textAlign:'center',padding:'8rem 0'}}>
      <h1 className="font-serif" style={{fontSize:'2rem',fontWeight:700,marginBottom:'1rem'}}>Product Not Found</h1>
      <a href="#/products" style={{background:'#1a5c2a',color:'white',padding:'12px 24px',borderRadius:'8px',textDecoration:'none'}}>Back to Shop</a>
    </div>
  );

  const related = PRODUCTS.filter(p => p.category === product.category && p.id !== product.id).slice(0,4);

  const handleAdd = () => {
    setIsAdding(true);
    addItem(product, quantity);
    toast({ title: "Added to cart", description: `${quantity}x ${product.name} added to your cart.` });
    setTimeout(() => setIsAdding(false), 1000);
  };

  return (
    <div className="container mx-auto px-4 py-8">
      {/* Breadcrumbs */}
      <div style={{display:'flex',alignItems:'center',gap:'6px',fontSize:'0.85rem',color:'#888',marginBottom:'2rem',flexWrap:'wrap'}}>
        <a href="#/" style={{color:'#888',textDecoration:'none',hover:'color:#1a5c2a'}}>Home</a>
        <ChevronRight size={14}/>
        <a href="#/products" style={{color:'#888',textDecoration:'none'}}>Products</a>
        <ChevronRight size={14}/>
        <span style={{color:'#0e2415',fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'200px'}}>{product.name}</span>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-12" style={{marginBottom:'5rem'}}>
        {/* Image */}
        <div style={{borderRadius:'20px',overflow:'hidden',aspectRatio:'1',background:'#f0ede5',position:'relative',border:'1px solid #e0d8cc'}}>
          {product.badge && <div style={{position:'absolute',top:'16px',left:'16px',zIndex:1}}><Badge variant={product.badge==="Best Seller"?"default":"secondary"}>{product.badge}</Badge></div>}
          <img src={product.image} alt={product.name} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
        </div>

        {/* Details */}
        <div style={{display:'flex',flexDirection:'column'}}>
          <h1 className="font-serif" style={{fontSize:'2.2rem',fontWeight:700,marginBottom:'1rem'}}>{product.name}</h1>
          <div style={{display:'flex',alignItems:'center',gap:'1rem',marginBottom:'1.5rem'}}>
            <span style={{fontSize:'1.75rem',fontWeight:700}}>${product.price.toFixed(2)}</span>
            <div style={{width:'1px',height:'24px',background:'#e0d8cc'}}/>
            <div style={{display:'flex',alignItems:'center',gap:'4px'}}>
              <Star size={18} filled/><span style={{fontWeight:600}}>{product.rating}</span>
              <span style={{color:'#888',fontSize:'0.9rem'}}>({product.reviewCount} reviews)</span>
            </div>
          </div>
          <p style={{fontSize:'1.05rem',color:'#4a6655',marginBottom:'2rem',lineHeight:1.7}}>{product.description}</p>
          <div style={{marginBottom:'1.5rem'}}>
            <h3 style={{fontWeight:600,marginBottom:'0.75rem'}}>Eco-Certifications</h3>
            <div style={{display:'flex',flexWrap:'wrap',gap:'8px'}}>
              {product.certifications.map(c => <Badge key={c} variant="outline" className="py-1 px-3"><Leaf size={12}/> {c}</Badge>)}
            </div>
          </div>
          <hr style={{margin:'1.5rem 0',borderColor:'#e0d8cc'}}/>
          {/* Quantity + Add to Cart */}
          <div style={{display:'flex',alignItems:'center',gap:'1rem',marginBottom:'2rem',flexWrap:'wrap'}}>
            <div style={{display:'flex',alignItems:'center',border:'1px solid #e0d8cc',borderRadius:'10px',overflow:'hidden',height:'48px',background:'white'}}>
              <button onClick={() => setQuantity(q => Math.max(1,q-1))} disabled={quantity<=1}
                style={{width:'44px',height:'100%',border:'none',background:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'#333'}}>
                <Minus size={16}/>
              </button>
              <div style={{width:'44px',textAlign:'center',fontWeight:600,fontSize:'1rem'}}>{quantity}</div>
              <button onClick={() => setQuantity(q => q+1)}
                style={{width:'44px',height:'100%',border:'none',background:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'#333'}}>
                <Plus size={16}/>
              </button>
            </div>
            <button onClick={handleAdd} disabled={isAdding}
              style={{flex:1,minWidth:'160px',height:'48px',background:isAdding?'#c97c3a':'#1a5c2a',color:'white',border:'none',borderRadius:'10px',fontWeight:600,fontSize:'1rem',cursor:isAdding?'default':'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',transition:'all 0.2s'}}>
              {isAdding ? <><Check size={18}/> Added to Cart</> : "Add to Cart"}
            </button>
          </div>
          {/* Trust badges */}
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
            {[[Truck,'Carbon Neutral Shipping','Free on orders over $50'],[ShieldCheck,'Ethical Sourcing','Fair labor standards verified'],[Recycle,'Zero-Waste Packaging','100% compostable or recyclable']].map(([Ic,t,d]) => (
              <div key={t} style={{display:'flex',alignItems:'flex-start',gap:'12px',padding:'14px',borderRadius:'12px',background:'#f7f5f0'}}>
                <Ic size={18} className="text-primary" style={{flexShrink:0,marginTop:'2px'}}/>
                <div><p style={{fontWeight:600,fontSize:'0.85rem',margin:'0 0 4px'}}>{t}</p><p style={{fontSize:'0.75rem',color:'#777',margin:0}}>{d}</p></div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Related */}
      {related.length > 0 && (
        <section style={{borderTop:'1px solid #e0d8cc',paddingTop:'3rem'}}>
          <h2 className="font-serif" style={{fontSize:'1.75rem',fontWeight:700,marginBottom:'2rem'}}>You might also like</h2>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            {related.map(p => <ProductCard key={p.id} product={p}/>)}
          </div>
        </section>
      )}
    </div>
  );
}

function Cart() {
  const { items, updateQuantity, removeItem, subtotal, shipping, total } = useCart();
  const { toast } = useToast();
  const [coupon, setCoupon] = useState("");

  const handleCoupon = (e) => {
    e.preventDefault();
    if (!coupon) return;
    toast({ title: "Invalid Coupon", description: "That coupon code doesn't exist or has expired.", variant: "destructive" });
    setCoupon("");
  };

  if (items.length === 0) return (
    <div style={{textAlign:'center',padding:'8rem 0',display:'flex',flexDirection:'column',alignItems:'center'}}>
      <div style={{width:'96px',height:'96px',background:'#e8f4ec',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:'1.5rem'}}>

      <h1 className="font-serif" style={{fontSize:'2rem',fontWeight:700,marginBottom:'1rem'}}>Your cart is empty</h1>
      <p style={{color:'#666',maxWidth:'400px',margin:'0 0 2rem',lineHeight:1.6}}>Discover our eco-friendly collection and start making a difference!</p>

  return (
    <div className="container mx-auto px-4 py-12">
      <h1 className="font-serif" style={{fontSize:'2.2rem',fontWeight:700,marginBottom:'2.5rem'}}>Your Cart</h1>
      <div style={{display:'flex',gap:'3rem',flexWrap:'wrap',alignItems:'flex-start'}}>
        {/* Items */}
        <div style={{flex:'1',minWidth:'0'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr',gap:0}}>
            {items.map(item => (
              <div key={item.product.id} style={{display:'flex',alignItems:'center',gap:'1rem',padding:'1.5rem 0',borderBottom:'1px solid #e0d8cc',flexWrap:'wrap'}}>

                </div>
                <div style={{flex:'1',minWidth:'140px'}}>
                  <a href={`#/products/${item.product.id}`} style={{fontWeight:600,fontSize:'1rem',textDecoration:'none',color:'#0e2415'}}>{item.product.name}</a>
                  <p style={{color:'#888',fontSize:'0.875rem',margin:'4px 0 0'}}>${item.product.price.toFixed(2)}</p>
                </div>
                <div style={{display:'flex',alignItems:'center',border:'1px solid #e0d8cc',borderRadius:'8px',overflow:'hidden',height:'38px',background:'white'}}>
                  <button onClick={() => updateQuantity(item.product.id, item.quantity-1)} disabled={item.quantity<=1}
                    style={{width:'36px',height:'100%',border:'none',background:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <Minus size={14}/>
                  </button>
                  <div style={{width:'36px',textAlign:'center',fontWeight:600,fontSize:'0.9rem'}}>{item.quantity}</div>
                  <button onClick={() => updateQuantity(item.product.id, item.quantity+1)}
                    style={{width:'36px',height:'100%',border:'none',background:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <Plus size={14}/>
                  </button>
                </div>
                <span style={{fontWeight:700,minWidth:'70px',textAlign:'right'}}>${(item.product.price*item.quantity).toFixed(2)}</span>
                <button onClick={() => removeItem(item.product.id)}
                  style={{background:'none',border:'none',cursor:'pointer',color:'#aaa',padding:'6px',display:'flex',alignItems:'center'}}>
                  <Trash2 size={18}/>
                </button>
              </div>
            ))}
          </div>
        </div>

        {/* Summary */}
        <div style={{width:'360px',flexShrink:0,background:'white',border:'1px solid #e0d8cc',borderRadius:'20px',padding:'1.5rem',position:'sticky',top:'80px'}}>
          <h2 className="font-serif" style={{fontSize:'1.25rem',fontWeight:700,marginBottom:'1.5rem'}}>Order Summary</h2>
          <div style={{display:'flex',flexDirection:'column',gap:'12px',marginBottom:'1.5rem',fontSize:'0.9rem'}}>

              <span style={{fontWeight:600,color:shipping===0?'#1a5c2a':'inherit'}}>{shipping===0?'Free':`$${shipping.toFixed(2)}`}</span>

            <button type="submit" style={{padding:'9px 16px',borderRadius:'8px',border:'1px solid #1a5c2a',color:'#1a5c2a',background:'white',cursor:'pointer',fontWeight:500,fontSize:'0.875rem'}}>Apply</button>
          </form>
        </div>
      </div>
    </div>
  );
}

/* =========================================================
   APP (ROUTER)
   ========================================================= */
function AppContent() {
  const { path } = useRouter();

  // Parse path for product detail
  const productMatch = path.match(/^\/products\/(.+)$/);

  let page;
  if (path === '/' || path === '') page = <Home/>;
  else if (path === '/products') page = <Products/>;
  else if (productMatch) page = <ProductDetail id={productMatch[1]}/>;
  else if (path === '/cart') page = <Cart/>;
  else if (path === '/checkout') page = <Checkout/>;
  else if (path === '/sustainability') page = <Sustainability/>;
  else if (path === '/about') page = <About/>;
  else page = <NotFound/>;

  return (
    <Layout>
      {page}
    </Layout>
  );
}

function App() {
  return (
    <Router>
      <CartProvider>
        <ToastProvider>
          <AppContent/>
        </ToastProvider>
      </CartProvider>
    </Router>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
